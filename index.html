<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Word Counter</title>
    </head>

    <body>
        <h1>Word Counter</h1>
        <div>
            <label for="text">Sentence:</label><br/>
            <textarea id="text" placeholder="Please enter you sentence."></textarea><br/>
            <button type="button" id="countBtn">Enter</button>
        </div>

        <p id="result">Word count: 0</p><br/>
        <p id="longest">Longest word: 0</p>

        <script src="script.js"></script>
    </body>
</html>
